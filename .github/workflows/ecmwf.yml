name: ECMWF Precipitation Forecast

on:

  workflow_dispatch:

  schedule:
    - cron: "0 9 * * 1"

jobs:

  run-ecmwf:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ECMWF forecast
        run: python ecmwf_precip.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: ecmwf-forecast
          path: outputs/
